<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Catálogo de Produtos</h1>
    </header>

    <main>
        <div class="bulbasaur">
            <h2>Cadastrar Produtos</h2>
            <br>
            <input type="text" placeholder="Nome do Produto" id="produto" class="moltres">
            <br>
            <input type="text" placeholder="Preço do Produto" id="preço" class="moltres">
            <br> <br>
            <button onclick="cadastro" class="zapdos">Cadastrar Produto</button>
            
            <p id="mensagem" class="articuno"></p>
        </div>

        <div class="ivysaur">
            <h2>Produtos Cadastrados</h2>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

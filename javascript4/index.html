<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Catálogo de Produtos</h1>
    </header>
    <div class="bulbasaur">
        <h1>Sistema de Cadastro de Produtos</h1>
        <input type="text" id="produto" placeholder="Produto" class="moltres">
        <br>      
        <input type="number" id="preco" placeholder="Preço" class="moltres">
        <br>
        <button onclick="cadastro()" class="zapdos">Cadastrar</button>
        <p id="mensagem"></p>
    </div>

    <div class="ivysaur">
        <h2>Produtos cadastrados</h2>
        <ul id="listaProdutos"></ul>
        <button onclick="mostrar()" class="zapdos">Mostrar</button>
        <p id="quantidade"></p>
        <br>
        <p id="itens"></p>
        
        
    </div>

    <script src="script.js"></script>
</body>

</html>
